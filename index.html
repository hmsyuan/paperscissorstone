<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>孤兒產生器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>孤兒產生器</h1>
      <section class="top">
        <input id="nickname" placeholder="設定暱稱" maxlength="20" />
        <button id="save-profile">儲存暱稱</button>
        <button id="leave-game">退出目前遊戲</button>
        <span id="status"></span>
      </section>

      <section id="lobby" class="panel">
        <h2>選擇遊戲</h2>
        <div id="game-list" class="games"></div>
      </section>

      <section id="game-room" class="panel" hidden>
        <div class="room-head">
          <h2 id="game-title"></h2>
          <div>
            <button id="claim-host">搶主持權</button>
            <button id="release-host">放棄主持權</button>
          </div>
        </div>
        <div class="layout">
          <div>
            <div id="participants"></div>
            <div id="game-ui"></div>
          </div>
          <div class="chat">
            <h3>聊天室</h3>
            <div id="chat-list"></div>
            <form id="chat-form">
              <input id="chat-input" maxlength="120" placeholder="輸入訊息" />
              <button>送出</button>
            </form>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
